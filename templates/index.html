<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MHXX お守りスナイプ</title>
  <style>
    :root {
      --bg: #1a1a2e;
      --surface: #16213e;
      --surface2: #0f3460;
      --accent: #e94560;
      --text: #eaeaea;
      --text2: #aaa;
      --border: #2a2a4a;
      --blue: #4fc3f7;
      --red: #ef5350;
      --yellow: #ffd54f;
      --white: #eeeeee;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 { font-size: 1.3rem; font-weight: 700; }
    header .subtitle { color: var(--text2); font-size: 0.85rem; }

    .layout {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 0;
      min-height: calc(100vh - 57px);
    }

    .sidebar {
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 20px;
      overflow-y: auto;
    }

    .main {
      padding: 20px;
      overflow-y: auto;
    }

    .section-title {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--text2);
      text-transform: uppercase;
      margin-bottom: 10px;
      margin-top: 20px;
    }
    .section-title:first-child { margin-top: 0; }

    .row { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
    .row label { font-size: 0.82rem; color: var(--text2); min-width: 60px; }

    select, input[type=text], input[type=number] {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      padding: 7px 10px;
      font-size: 0.85rem;
      width: 100%;
      outline: none;
      transition: border-color 0.2s;
    }
    select:focus, input:focus { border-color: var(--accent); }

    .btn-group { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
    .btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      padding: 6px 14px;
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.15s;
      flex: 1;
    }
    .btn:hover { background: var(--accent); border-color: var(--accent); }
    .btn.active { background: var(--accent); border-color: var(--accent); font-weight: 700; }
    .btn.blue.active { background: #1565c0; border-color: var(--blue); }
    .btn.red.active { background: #b71c1c; border-color: var(--red); }
    .btn.yellow.active { background: #f57f17; border-color: var(--yellow); color: #111; }
    .btn.white.active { background: #555; border-color: var(--white); }

    .search-btn {
      width: 100%;
      background: var(--accent);
      border: none;
      color: #fff;
      border-radius: 8px;
      padding: 12px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 16px;
      transition: opacity 0.2s;
    }
    .search-btn:hover { opacity: 0.85; }
    .search-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .results-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .results-header h2 { font-size: 1rem; font-weight: 700; }
    .count-badge {
      background: var(--accent);
      color: #fff;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 2px 10px;
      border-radius: 99px;
    }

    .results-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }
    .results-table th {
      background: var(--surface);
      padding: 8px 12px;
      text-align: left;
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
    }
    .results-table td {
      padding: 9px 12px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    .results-table tr:hover td { background: rgba(255,255,255,0.03); }

    .frame-cell { font-family: monospace; color: var(--blue); }
    .time-cell { color: var(--text2); font-size: 0.78rem; }
    .skill-name { font-weight: 600; }
    .sp { color: var(--yellow); font-weight: 700; font-family: monospace; }
    .slot { color: var(--accent); font-weight: 700; }
    .rare-badge {
      font-size: 0.7rem;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 4px;
      background: #333;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text2);
    }
    .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }

    .error-msg {
      background: rgba(233,69,96,0.15);
      border: 1px solid var(--accent);
      border-radius: 8px;
      padding: 12px 16px;
      color: var(--accent);
      font-size: 0.85rem;
      margin-bottom: 16px;
    }

    .spinner {
      display: none;
      width: 20px; height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto;
    }
    .spinner.show { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .seed-hint { font-size: 0.72rem; color: var(--text2); margin-top: 4px; }

    .mode-tabs { display: flex; gap: 0; margin-bottom: 16px; }
    .mode-tab {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text2);
      padding: 8px;
      font-size: 0.82rem;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
    }
    .mode-tab:first-child { border-radius: 6px 0 0 6px; }
    .mode-tab:last-child { border-radius: 0 6px 6px 0; }
    .mode-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 700; }

    @media (max-width: 700px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar { border-right: none; border-bottom: 1px solid var(--border); }
    }
  </style>
</head>
<body>

<header>
  <div>
    <h1>⚔️ MHXX お守りスナイプ</h1>
    <div class="subtitle">Monster Hunter XX Charm RNG Tool — ローカル版</div>
  </div>
</header>

<div class="layout">
  <aside class="sidebar">

    <div class="section-title">言語 / Language</div>
    <div class="btn-group">
      <button class="btn active" id="lang-ja" onclick="setLang('ja')">日本語</button>
      <button class="btn" id="lang-en" onclick="setLang('en')">English</button>
    </div>

    <div class="section-title">お守りカラー</div>
    <div class="btn-group">
      <button class="btn blue active" id="color-blue" onclick="setColor('blue')">風化 Blue</button>
      <button class="btn red" id="color-red" onclick="setColor('red')">古び Red</button>
      <button class="btn yellow" id="color-yellow" onclick="setColor('yellow')">光る Yellow</button>
      <button class="btn white" id="color-white" onclick="setColor('white')">なぞ White</button>
    </div>

    <div class="section-title">シード値 (任意)</div>
    <input type="text" id="seed" placeholder="0194FD72, 79E6C985, 08DD9701, 41CFCE91">
    <div class="seed-hint">空欄でデフォルトシードを使用</div>

    <div class="section-title">入手方法</div>
    <div class="row">
      <select id="origin"></select>
    </div>

    <div class="section-title">検索モード</div>
    <div class="mode-tabs">
      <div class="mode-tab active" onclick="setMode('exact')">完全一致</div>
      <div class="mode-tab" onclick="setMode('greater')">以上検索</div>
    </div>

    <div class="section-title">スキル1</div>
    <div class="row">
      <select id="skill1" onchange="updateSpMax('sp1', this)"></select>
    </div>
    <div class="row">
      <label>ポイント</label>
      <input type="number" id="sp1" value="7" min="1" max="20" style="width:80px">
      <span id="sp1-max" style="color:var(--text2);font-size:0.78rem">/ 20</span>
    </div>

    <div class="section-title">スキル2 (任意)</div>
    <div class="row">
      <select id="skill2" onchange="updateSpMax('sp2', this)"><option value="">— なし —</option></select>
    </div>
    <div class="row">
      <label>ポイント</label>
      <input type="number" id="sp2" value="5" min="1" max="20" style="width:80px">
      <span id="sp2-max" style="color:var(--text2);font-size:0.78rem">/ 20</span>
    </div>

    <div class="section-title">スロット (最低)</div>
    <div class="btn-group" id="slot-group">
      <button class="btn active" onclick="setSlot(0)">0</button>
      <button class="btn" onclick="setSlot(1)">1</button>
      <button class="btn" onclick="setSlot(2)">2</button>
      <button class="btn" onclick="setSlot(3)">3</button>
    </div>

    <div class="section-title">検索範囲</div>
    <div class="row">
      <label>開始F</label>
      <input type="number" id="start" value="0" min="0">
    </div>
    <div class="row">
      <label>検索数</label>
      <input type="number" id="step" value="500000" min="1000" max="10000000">
    </div>

    <button class="search-btn" id="search-btn" onclick="doSearch()">🔍 検索</button>
    <div class="spinner" id="spinner"></div>

  </aside>

  <main class="main">
    <div id="error-area"></div>
    <div class="results-header">
      <h2 id="results-title">検索結果</h2>
      <span class="count-badge" id="count-badge" style="display:none"></span>
    </div>

    <div id="results-area">
      <div class="empty-state">
        <div class="icon">🔮</div>
        <div>条件を設定して検索してください</div>
      </div>
    </div>
  </main>
</div>

<script>
let currentLang = 'ja';
let currentColor = 'blue';
let currentMode = 'exact';
let currentSlot = 0;

async function loadSkills() {
  const res = await fetch(`/api/skills?lang=${currentLang}&color=${currentColor}`);
  const data = await res.json();

  const sk1 = document.getElementById('skill1');
  const sk2 = document.getElementById('skill2');
  const orig = document.getElementById('origin');

  const prev1 = sk1.value;
  const prev2 = sk2.value;

  sk1.innerHTML = '<option value="__any__" data-max="20">★ なんでも（スキル1あり）</option>' + data.skill1.map((s, i) => `<option value="${s}" data-max="${data.skill1_max[i]}">${s}</option>`).join('');
  sk2.innerHTML = '<option value="" data-max="20">— なし —</option><option value="__any__" data-max="20">★ なんでも（スキル2あり）</option>' + data.skill2.map((s, i) => `<option value="${s}" data-max="${data.skill2_max[i]}">${s}</option>`).join('');
  orig.innerHTML = data.origin.map(s => `<option value="${s}">${s}</option>`).join('');

  if (prev1 && [...sk1.options].some(o => o.value === prev1)) sk1.value = prev1;
  if (prev2 && [...sk2.options].some(o => o.value === prev2)) sk2.value = prev2;

  updateSpMax('sp1', sk1);
  updateSpMax('sp2', sk2);
}

function updateSpMax(inputId, selectEl) {
  const selected = selectEl.options[selectEl.selectedIndex];
  const isAny = selected && selected.value === '__any__';
  const isEmpty = !selected || selected.value === '';
  const max = (isAny || isEmpty) ? 20 : parseInt(selected.dataset.max || 20);
  const input = document.getElementById(inputId);
  const label = document.getElementById(inputId + '-max');
  input.max = max;
  input.disabled = isEmpty;
  if (parseInt(input.value) > max) input.value = max;
  if (label) label.textContent = isEmpty ? '' : '以上 (max ' + max + ')';
}

function setLang(lang) {
  currentLang = lang;
  document.querySelectorAll('[id^=lang-]').forEach(b => b.classList.remove('active'));
  document.getElementById('lang-' + lang).classList.add('active');
  loadSkills();
}

function setColor(color) {
  currentColor = color;
  document.querySelectorAll('[id^=color-]').forEach(b => b.classList.remove('active'));
  document.getElementById('color-' + color).classList.add('active');
  loadSkills();
}

function setMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-tab').forEach((t, i) => {
    t.classList.toggle('active', (i === 0 && mode === 'exact') || (i === 1 && mode === 'greater'));
  });
}

function setSlot(n) {
  currentSlot = n;
  document.querySelectorAll('#slot-group .btn').forEach((b, i) => b.classList.toggle('active', i === n));
}

const RARE_COLORS = {
  8: '#80c0c0', 9: '#ffc080', 10: '#c040c0',
  7: '#c04040', 6: '#4040c0', 5: '#40c060',
  4: '#c080c0', 3: '#c0c000', 2: '#8080ff', 1: '#808080'
};

function renderResults(data) {
  const area = document.getElementById('results-area');
  const badge = document.getElementById('count-badge');
  if (!data.results || data.results.length === 0) {
    area.innerHTML = '<div class="empty-state"><div class="icon">😔</div><div>該当するお守りが見つかりませんでした</div></div>';
    badge.style.display = 'none';
    return;
  }
  badge.textContent = data.results.length + '件';
  badge.style.display = '';

  const rows = data.results.map(r => {
    const c = r.charm;
    const rareColor = RARE_COLORS[c.rare] || '#888';
    const sk2cell = c.skill2
      ? `<span class="skill-name">${c.skill2}</span> <span class="sp">+${c.sp2}</span>`
      : '<span style="color:#555">—</span>';
    return `<tr>
      <td class="frame-cell">${r.frame.toLocaleString()}</td>
      <td class="time-cell">${r.time}</td>
      <td><span class="skill-name">${c.skill1}</span> <span class="sp">+${c.sp1}</span></td>
      <td>${sk2cell}</td>
      <td class="slot">${'◆'.repeat(c.slots)}${'◇'.repeat(3 - c.slots)}</td>
      <td><span class="rare-badge" style="color:${rareColor}">R${c.rare}</span></td>
    </tr>`;
  }).join('');

  area.innerHTML = `<table class="results-table">
    <thead><tr>
      <th>フレーム</th>
      <th>時間</th>
      <th>スキル1</th>
      <th>スキル2</th>
      <th>スロット</th>
      <th>レア</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

async function doSearch() {
  const btn = document.getElementById('search-btn');
  const spinner = document.getElementById('spinner');
  const errorArea = document.getElementById('error-area');
  errorArea.innerHTML = '';
  btn.disabled = true;
  spinner.classList.add('show');

  const payload = {
    lang: currentLang,
    color: currentColor,
    mode: currentMode,
    seed: document.getElementById('seed').value.trim(),
    origin: document.getElementById('origin').value,
    skill1: document.getElementById('skill1').value,
    sp1: parseInt(document.getElementById('sp1').value) || 0,
    skill2: document.getElementById('skill2').value,
    sp2: parseInt(document.getElementById('sp2').value) || 0,
    slots: currentSlot,
    start: parseInt(document.getElementById('start').value) || 0,
    step: parseInt(document.getElementById('step').value) || 100000,
  };

  try {
    const res = await fetch('/api/search', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    const data = await res.json();
    if (data.error) {
      errorArea.innerHTML = `<div class="error-msg">⚠️ ${data.error}</div>`;
    } else {
      renderResults(data);
    }
  } catch (e) {
    errorArea.innerHTML = `<div class="error-msg">⚠️ 通信エラー: ${e.message}</div>`;
  } finally {
    btn.disabled = false;
    spinner.classList.remove('show');
  }
}

loadSkills();
</script>
</body>
</html>
