<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MHXX お守りスナイプ</title>
  <style>
    :root {
      --bg: #1a1a2e;
      --surface: #16213e;
      --surface2: #0f3460;
      --accent: #e94560;
      --text: #eaeaea;
      --text2: #aaa;
      --border: #2a2a4a;
      --blue: #4fc3f7;
      --red: #ef5350;
      --yellow: #ffd54f;
      --white: #eeeeee;
      --green: #66bb6a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    header h1 { font-size: 1.2rem; font-weight: 700; }
    header .subtitle { color: var(--text2); font-size: 0.82rem; }
    .back-btn {
      display: none;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      padding: 7px 16px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .back-btn:hover { background: var(--accent); border-color: var(--accent); }

    /* ── Screens ── */
    .screen { display: none; }
    .screen.active { display: block; }

    /* ════════════════════════════
       SEARCH SCREEN
    ════════════════════════════ */
    .layout {
      display: grid;
      grid-template-columns: 340px 1fr;
      min-height: calc(100vh - 53px);
    }
    .sidebar {
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 20px;
      overflow-y: auto;
      max-height: calc(100vh - 53px);
    }
    .main { padding: 20px; overflow-y: auto; }

    .section-title {
      font-size: 0.7rem; font-weight: 700; letter-spacing: 0.1em;
      color: var(--text2); text-transform: uppercase;
      margin-bottom: 10px; margin-top: 20px;
    }
    .section-title:first-child { margin-top: 0; }

    .row { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
    .row label { font-size: 0.82rem; color: var(--text2); min-width: 60px; }

    select, input[type=text], input[type=number] {
      background: var(--bg); border: 1px solid var(--border); color: var(--text);
      border-radius: 6px; padding: 7px 10px; font-size: 0.85rem; width: 100%;
      outline: none; transition: border-color 0.2s;
    }
    select:focus, input:focus { border-color: var(--accent); }

    .btn-group { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
    .btn {
      background: var(--surface2); border: 1px solid var(--border); color: var(--text);
      border-radius: 6px; padding: 6px 14px; font-size: 0.82rem; cursor: pointer;
      transition: all 0.15s; flex: 1;
    }
    .btn:hover { background: var(--accent); border-color: var(--accent); }
    .btn.active { background: var(--accent); border-color: var(--accent); font-weight: 700; }
    .btn.blue.active  { background: #1565c0; border-color: var(--blue); }
    .btn.red.active   { background: #b71c1c; border-color: var(--red); }
    .btn.yellow.active{ background: #f57f17; border-color: var(--yellow); color: #111; }
    .btn.white.active { background: #555;    border-color: var(--white); }

    .search-btn {
      width: 100%; background: var(--accent); border: none; color: #fff;
      border-radius: 8px; padding: 12px; font-size: 1rem; font-weight: 700;
      cursor: pointer; margin-top: 16px; transition: opacity 0.2s;
    }
    .search-btn:hover { opacity: 0.85; }
    .search-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .results-header {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px;
    }
    .results-header h2 { font-size: 1rem; font-weight: 700; }
    .count-badge {
      background: var(--accent); color: #fff; font-size: 0.75rem; font-weight: 700;
      padding: 2px 10px; border-radius: 99px;
    }

    .results-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    .results-table th {
      background: var(--surface); padding: 8px 12px; text-align: left;
      font-size: 0.72rem; font-weight: 600; color: var(--text2); text-transform: uppercase;
      letter-spacing: 0.05em; border-bottom: 1px solid var(--border); position: sticky; top: 0;
    }
    .results-table td { padding: 9px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    .results-table tr:hover td { background: rgba(255,255,255,0.03); }
    .results-table tr.snipe-row { cursor: pointer; }
    .results-table tr.snipe-row:hover td { background: rgba(233,69,96,0.12); }
    .snipe-hint { font-size: 0.72rem; color: var(--accent); }

    .frame-cell { font-family: monospace; color: var(--blue); }
    .time-cell  { color: var(--text2); font-size: 0.78rem; }
    .skill-name { font-weight: 600; }
    .sp   { color: var(--yellow); font-weight: 700; font-family: monospace; }
    .slot { color: var(--accent); font-weight: 700; }
    .rare-badge { font-size: 0.7rem; font-weight: 700; padding: 2px 6px; border-radius: 4px; background: #333; }

    .empty-state { text-align: center; padding: 60px 20px; color: var(--text2); }
    .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }
    .error-msg {
      background: rgba(233,69,96,0.15); border: 1px solid var(--accent); border-radius: 8px;
      padding: 12px 16px; color: var(--accent); font-size: 0.85rem; margin-bottom: 16px;
    }
    .spinner {
      display: none; width: 20px; height: 20px; border: 2px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin 0.7s linear infinite; margin: 0 auto;
    }
    .spinner.show { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .seed-hint { font-size: 0.72rem; color: var(--text2); margin-top: 4px; }
    .mode-tabs { display: flex; gap: 0; margin-bottom: 16px; }
    .mode-tab {
      flex: 1; background: var(--surface2); border: 1px solid var(--border);
      color: var(--text2); padding: 8px; font-size: 0.82rem; cursor: pointer;
      text-align: center; transition: all 0.15s;
    }
    .mode-tab:first-child { border-radius: 6px 0 0 6px; }
    .mode-tab:last-child  { border-radius: 0 6px 6px 0; }
    .mode-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 700; }

    /* ════════════════════════════
       SNIPE SCREEN
    ════════════════════════════ */
    .snipe-screen {
      display: flex; flex-direction: column; align-items: center;
      padding: 32px 24px; gap: 28px; min-height: calc(100vh - 53px);
    }

    /* Target charm card */
    .target-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
      padding: 20px 32px; display: flex; gap: 32px; align-items: center; flex-wrap: wrap;
      justify-content: center; width: 100%; max-width: 700px;
    }
    .target-card .label { font-size: 0.68rem; color: var(--text2); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
    .target-frame-tag { font-family: monospace; font-size: 1.3rem; color: var(--blue); font-weight: 700; }
    .target-time-tag  { font-size: 0.78rem; color: var(--text2); font-family: monospace; }
    .target-skills    { font-size: 1rem; font-weight: 600; }
    .target-rare      { font-size: 0.85rem; font-weight: 700; }

    /* Big frame counter */
    .counter-area { text-align: center; }
    .counter-current {
      font-family: monospace; font-size: 4rem; font-weight: 700; color: var(--blue);
      line-height: 1; letter-spacing: 0.05em;
    }
    .counter-time { font-family: monospace; font-size: 1rem; color: var(--text2); margin-top: 6px; }
    .counter-remain {
      font-family: monospace; font-size: 1.5rem; font-weight: 700; margin-top: 12px;
      transition: color 0.3s;
    }
    .counter-remain.close { color: var(--accent); }
    .counter-remain.ok    { color: var(--green); }

    /* Timer controls */
    .timer-controls { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; justify-content: center; }
    .ctrl-btn {
      background: var(--surface2); border: 1px solid var(--border); color: var(--text);
      border-radius: 8px; padding: 10px 24px; font-size: 1rem; font-weight: 700;
      cursor: pointer; transition: all 0.15s; min-width: 100px; text-align: center;
    }
    .ctrl-btn:hover { background: var(--surface); }
    .ctrl-btn.start  { background: var(--green); border-color: var(--green); color: #111; }
    .ctrl-btn.start:hover { opacity: 0.85; }
    .ctrl-btn.stop   { background: var(--accent); border-color: var(--accent); color: #fff; }
    .ctrl-btn.stop:hover { opacity: 0.85; }

    /* Metronome */
    .metro-panel {
      background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
      padding: 20px 32px; display: flex; flex-direction: column; align-items: center;
      gap: 14px; width: 100%; max-width: 400px;
    }
    .metro-title { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.1em; color: var(--text2); text-transform: uppercase; }
    .beat-dots { display: flex; gap: 8px; }
    .beat-dot {
      width: 16px; height: 16px; border-radius: 50%; background: var(--border); transition: background 0.04s;
    }
    .beat-dot.on-accent { background: var(--yellow) !important; }
    .beat-dot.on        { background: var(--accent); }
    .metro-row { display: flex; align-items: center; gap: 10px; width: 100%; }
    .metro-row label { font-size: 0.82rem; color: var(--text2); white-space: nowrap; }
    .metro-row input[type=range] { flex: 1; accent-color: var(--accent); }
    .metro-row span { font-size: 0.82rem; color: var(--text); min-width: 52px; text-align: right; }
    .metro-start-btn {
      background: var(--surface2); border: 1px solid var(--border); color: var(--text);
      border-radius: 8px; padding: 8px 28px; font-size: 0.9rem; font-weight: 700;
      cursor: pointer; transition: all 0.15s; width: 100%;
    }
    .metro-start-btn.running { background: var(--accent); border-color: var(--accent); color: #fff; }
    .metro-start-btn:hover { opacity: 0.85; }

    @media (max-width: 700px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar { border-right: none; border-bottom: 1px solid var(--border); max-height: none; }
      .counter-current { font-size: 2.8rem; }
    }
  </style>
</head>
<body>

<header>
  <div>
    <h1>⚔️ MHXX お守りスナイプ</h1>
    <div class="subtitle">Monster Hunter XX Charm RNG Tool</div>
  </div>
  <button class="back-btn" id="back-btn" onclick="showSearch()">← 検索に戻る</button>
</header>

<!-- ══════════ SCREEN: Search ══════════ -->
<div class="screen active" id="screen-search">
<div class="layout">
  <aside class="sidebar">

    <div class="section-title">言語 / Language</div>
    <div class="btn-group">
      <button class="btn active" id="lang-ja" onclick="setLang('ja')">日本語</button>
      <button class="btn" id="lang-en" onclick="setLang('en')">English</button>
    </div>

    <div class="section-title">お守りカラー</div>
    <div class="btn-group">
      <button class="btn blue active"   id="color-blue"   onclick="setColor('blue')">風化 Blue</button>
      <button class="btn red"           id="color-red"    onclick="setColor('red')">古び Red</button>
      <button class="btn yellow"        id="color-yellow" onclick="setColor('yellow')">光る Yellow</button>
      <button class="btn white"         id="color-white"  onclick="setColor('white')">なぞ White</button>
    </div>

    <div class="section-title">シード値 (任意)</div>
    <input type="text" id="seed" placeholder="0194FD72, 79E6C985, 08DD9701, 41CFCE91">
    <div class="seed-hint">空欄でデフォルトシードを使用</div>

    <div class="section-title">入手方法</div>
    <div class="row"><select id="origin"></select></div>

    <div class="section-title">検索モード</div>
    <div class="mode-tabs">
      <div class="mode-tab active" onclick="setMode('exact')">完全一致</div>
      <div class="mode-tab" onclick="setMode('greater')">以上検索</div>
    </div>

    <div class="section-title">スキル1</div>
    <div class="row"><select id="skill1" onchange="updateSpMax('sp1', this)"></select></div>
    <div class="row">
      <label>ポイント</label>
      <input type="number" id="sp1" value="7" min="1" max="20" style="width:80px">
      <span id="sp1-max" style="color:var(--text2);font-size:0.78rem"></span>
    </div>

    <div class="section-title">スキル2 (任意)</div>
    <div class="row"><select id="skill2" onchange="updateSpMax('sp2', this)"><option value="">— なし —</option></select></div>
    <div class="row">
      <label>ポイント</label>
      <input type="number" id="sp2" value="5" min="1" max="20" style="width:80px">
      <span id="sp2-max" style="color:var(--text2);font-size:0.78rem"></span>
    </div>

    <div class="section-title">スロット (最低)</div>
    <div class="btn-group" id="slot-group">
      <button class="btn active" onclick="setSlot(0)">0</button>
      <button class="btn" onclick="setSlot(1)">1</button>
      <button class="btn" onclick="setSlot(2)">2</button>
      <button class="btn" onclick="setSlot(3)">3</button>
    </div>

    <div class="section-title">検索範囲</div>
    <div class="row">
      <label>開始F</label>
      <input type="number" id="start" value="0" min="0">
    </div>
    <div class="row">
      <label>検索数</label>
      <input type="number" id="step" value="500000" min="1000" max="10000000">
    </div>

    <button class="search-btn" id="search-btn" onclick="doSearch()">🔍 検索</button>
    <div class="spinner" id="spinner"></div>
  </aside>

  <main class="main">
    <div id="error-area"></div>
    <div class="results-header">
      <h2>検索結果</h2>
      <span class="count-badge" id="count-badge" style="display:none"></span>
    </div>
    <div id="results-area">
      <div class="empty-state">
        <div class="icon">🔮</div>
        <div>条件を設定して検索してください</div>
      </div>
    </div>
  </main>
</div>
</div><!-- /screen-search -->

<!-- ══════════ SCREEN: Snipe ══════════ -->
<div class="screen" id="screen-snipe">
<div class="snipe-screen">

  <!-- Target info -->
  <div class="target-card">
    <div>
      <div class="label">目標フレーム</div>
      <div class="target-frame-tag" id="sn-frame">—</div>
      <div class="target-time-tag"  id="sn-time">—</div>
    </div>
    <div>
      <div class="label">お守り</div>
      <div class="target-skills" id="sn-charm">—</div>
      <div class="target-rare"   id="sn-rare">—</div>
    </div>
  </div>

  <!-- Big counter -->
  <div class="counter-area">
    <div class="counter-current" id="sn-current">0</div>
    <div class="counter-time"    id="sn-current-time">0d 0h 0m 0s 0f</div>
    <div class="counter-remain"  id="sn-remain">目標まで — F</div>
  </div>

  <!-- Timer buttons -->
  <div class="timer-controls">
    <button class="ctrl-btn start" id="sn-timer-btn" onclick="snTimerToggle()">▶ スタート</button>
    <button class="ctrl-btn" onclick="snTimerReset()">↺ リセット</button>
  </div>

  <!-- Metronome -->
  <div class="metro-panel">
    <div class="metro-title">メトロノーム</div>
    <div class="beat-dots" id="beat-dots">
      <div class="beat-dot" id="bd0"></div>
      <div class="beat-dot" id="bd1"></div>
      <div class="beat-dot" id="bd2"></div>
      <div class="beat-dot" id="bd3"></div>
    </div>
    <div class="metro-row">
      <label>速度</label>
      <input type="range" id="metro-bpm" min="10" max="60" value="30" step="1" oninput="metroUpdateBpm()">
      <span id="metro-bpm-label">30 fps</span>
    </div>
    <button class="metro-start-btn" id="metro-btn" onclick="metroToggle()">▶ メトロノーム開始</button>
  </div>

</div>
</div><!-- /screen-snipe -->

<script>
// ─── Screen navigation ────────────────────────────────────
function showSearch() {
  document.getElementById('screen-search').classList.add('active');
  document.getElementById('screen-snipe').classList.remove('active');
  document.getElementById('back-btn').style.display = 'none';
  snTimerStop();
  metroStop();
}

function showSnipe(result) {
  const c = result.charm;
  document.getElementById('sn-frame').textContent = result.frame.toLocaleString();
  document.getElementById('sn-time').textContent  = result.time;

  const sk1 = `${c.skill1} +${c.sp1}`;
  const sk2 = c.skill2 ? `  /  ${c.skill2} +${c.sp2}` : '';
  const slots = '◆'.repeat(c.slots) + '◇'.repeat(3 - c.slots);
  document.getElementById('sn-charm').textContent = sk1 + sk2 + '  ' + slots;

  const rareColor = RARE_COLORS[c.rare] || '#888';
  document.getElementById('sn-rare').innerHTML = `<span style="color:${rareColor};font-weight:700">RARE${c.rare}</span>`;

  snTarget = result.frame;
  snTimerReset();

  document.getElementById('screen-search').classList.remove('active');
  document.getElementById('screen-snipe').classList.add('active');
  document.getElementById('back-btn').style.display = '';
}

// ─── Search ───────────────────────────────────────────────
let currentLang = 'ja';
let currentColor = 'blue';
let currentMode = 'exact';
let currentSlot = 0;

async function loadSkills() {
  const res = await fetch(`/api/skills?lang=${currentLang}&color=${currentColor}`);
  const data = await res.json();
  const sk1 = document.getElementById('skill1');
  const sk2 = document.getElementById('skill2');
  const orig = document.getElementById('origin');
  const prev1 = sk1.value, prev2 = sk2.value;
  sk1.innerHTML = '<option value="__any__" data-max="20">★ なんでも（スキル1あり）</option>' +
    data.skill1.map((s,i) => `<option value="${s}" data-max="${data.skill1_max[i]}">${s}</option>`).join('');
  sk2.innerHTML = '<option value="" data-max="20">— なし —</option><option value="__any__" data-max="20">★ なんでも（スキル2あり）</option>' +
    data.skill2.map((s,i) => `<option value="${s}" data-max="${data.skill2_max[i]}">${s}</option>`).join('');
  orig.innerHTML = data.origin.map(s => `<option value="${s}">${s}</option>`).join('');
  if (prev1 && [...sk1.options].some(o => o.value === prev1)) sk1.value = prev1;
  if (prev2 && [...sk2.options].some(o => o.value === prev2)) sk2.value = prev2;
  updateSpMax('sp1', sk1);
  updateSpMax('sp2', sk2);
}

function updateSpMax(inputId, selectEl) {
  const sel = selectEl.options[selectEl.selectedIndex];
  const isAny = sel && sel.value === '__any__';
  const isEmpty = !sel || sel.value === '';
  const max = (isAny || isEmpty) ? 20 : parseInt(sel.dataset.max || 20);
  const input = document.getElementById(inputId);
  const label = document.getElementById(inputId + '-max');
  input.max = max;
  input.disabled = isEmpty;
  if (parseInt(input.value) > max) input.value = max;
  if (label) label.textContent = isEmpty ? '' : `以上 (max ${max})`;
}

function setLang(lang) {
  currentLang = lang;
  document.querySelectorAll('[id^=lang-]').forEach(b => b.classList.remove('active'));
  document.getElementById('lang-' + lang).classList.add('active');
  loadSkills();
}
function setColor(color) {
  currentColor = color;
  document.querySelectorAll('[id^=color-]').forEach(b => b.classList.remove('active'));
  document.getElementById('color-' + color).classList.add('active');
  loadSkills();
}
function setMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-tab').forEach((t, i) =>
    t.classList.toggle('active', (i === 0 && mode === 'exact') || (i === 1 && mode === 'greater')));
}
function setSlot(n) {
  currentSlot = n;
  document.querySelectorAll('#slot-group .btn').forEach((b, i) => b.classList.toggle('active', i === n));
}

const RARE_COLORS = {
  8:'#80c0c0', 9:'#ffc080', 10:'#c040c0',
  7:'#c04040', 6:'#4040c0', 5:'#40c060',
  4:'#c080c0', 3:'#c0c000', 2:'#8080ff', 1:'#808080'
};

function renderResults(data) {
  const area  = document.getElementById('results-area');
  const badge = document.getElementById('count-badge');
  if (!data.results || data.results.length === 0) {
    area.innerHTML = '<div class="empty-state"><div class="icon">😔</div><div>該当するお守りが見つかりませんでした</div></div>';
    badge.style.display = 'none';
    return;
  }
  badge.textContent = data.results.length + '件';
  badge.style.display = '';

  const rows = data.results.map((r, idx) => {
    const c = r.charm;
    const rareColor = RARE_COLORS[c.rare] || '#888';
    const sk2cell = c.skill2
      ? `<span class="skill-name">${c.skill2}</span> <span class="sp">+${c.sp2}</span>`
      : '<span style="color:#555">—</span>';
    return `<tr class="snipe-row" onclick="showSnipe(${idx})" title="クリックでスナイプ画面へ">
      <td class="frame-cell">${r.frame.toLocaleString()}</td>
      <td class="time-cell">${r.time}</td>
      <td><span class="skill-name">${c.skill1}</span> <span class="sp">+${c.sp1}</span></td>
      <td>${sk2cell}</td>
      <td class="slot">${'◆'.repeat(c.slots)}${'◇'.repeat(3-c.slots)}</td>
      <td><span class="rare-badge" style="color:${rareColor}">R${c.rare}</span></td>
      <td class="snipe-hint">▶ スナイプ</td>
    </tr>`;
  }).join('');

  area.innerHTML = `<table class="results-table">
    <thead><tr>
      <th>フレーム</th><th>時間</th><th>スキル1</th><th>スキル2</th><th>スロット</th><th>レア</th><th></th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

let searchResults = [];
function showSnipeByIdx(idx) { showSnipe(searchResults[idx]); }

async function doSearch() {
  const btn = document.getElementById('search-btn');
  const spinner = document.getElementById('spinner');
  const errorArea = document.getElementById('error-area');
  errorArea.innerHTML = '';
  btn.disabled = true;
  spinner.classList.add('show');

  const payload = {
    lang: currentLang, color: currentColor, mode: currentMode,
    seed: document.getElementById('seed').value.trim(),
    origin: document.getElementById('origin').value,
    skill1: document.getElementById('skill1').value,
    sp1: parseInt(document.getElementById('sp1').value) || 0,
    skill2: document.getElementById('skill2').value,
    sp2: parseInt(document.getElementById('sp2').value) || 0,
    slots: currentSlot,
    start: parseInt(document.getElementById('start').value) || 0,
    step: parseInt(document.getElementById('step').value) || 100000,
  };

  try {
    const res = await fetch('/api/search', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(payload),
    });
    const data = await res.json();
    if (data.error) {
      errorArea.innerHTML = `<div class="error-msg">⚠️ ${data.error}</div>`;
    } else {
      searchResults = data.results;
      renderResults(data);
    }
  } catch (e) {
    errorArea.innerHTML = `<div class="error-msg">⚠️ 通信エラー: ${e.message}</div>`;
  } finally {
    btn.disabled = false;
    spinner.classList.remove('show');
  }
}

// showSnipe receives a result object directly from the table onclick
// but we stored results in searchResults — use index
window.showSnipe = function(idxOrObj) {
  const r = typeof idxOrObj === 'number' ? searchResults[idxOrObj] : idxOrObj;
  if (!r) return;

  const c = r.charm;
  document.getElementById('sn-frame').textContent = r.frame.toLocaleString();
  document.getElementById('sn-time').textContent  = r.time;

  const sk1 = `${c.skill1} +${c.sp1}`;
  const sk2 = c.skill2 ? `  /  ${c.skill2} +${c.sp2}` : '';
  const slots = '◆'.repeat(c.slots) + '◇'.repeat(3 - c.slots);
  document.getElementById('sn-charm').textContent = sk1 + sk2 + '  ' + slots;

  const rareColor = RARE_COLORS[c.rare] || '#888';
  document.getElementById('sn-rare').innerHTML = `<span style="color:${rareColor};font-weight:700">RARE${c.rare}</span>`;

  snTarget = r.frame;
  snTimerReset();

  document.getElementById('screen-search').classList.remove('active');
  document.getElementById('screen-snipe').classList.add('active');
  document.getElementById('back-btn').style.display = '';
}

// ─── Snipe Timer ──────────────────────────────────────────
const FPS = 30;
const MS_PER_FRAME = 1000 / FPS;
let snTarget = 0;
let snFrame  = 0;
let snRunning = false;
let snInterval = null;

function frameToTime(fr) {
  const d = Math.floor(fr / 2592000);
  const h = Math.floor((fr % 2592000) / 108000);
  const m = Math.floor((fr % 108000) / 1800);
  const s = Math.floor((fr % 1800) / 30);
  const f = fr % 30;
  return `${d}d ${h}h ${m}m ${s}s ${f}f`;
}

function snTimerTick() {
  snFrame++;
  const remain = snTarget - snFrame;
  document.getElementById('sn-current').textContent      = snFrame.toLocaleString();
  document.getElementById('sn-current-time').textContent = frameToTime(snFrame);

  const rem = document.getElementById('sn-remain');
  if (remain > 0) {
    rem.textContent = `目標まで ${remain.toLocaleString()} F`;
    rem.className = 'counter-remain' + (remain <= 300 ? ' close' : '');
  } else if (remain === 0) {
    rem.textContent = '✔ 目標フレーム！';
    rem.className = 'counter-remain ok';
  } else {
    rem.textContent = `目標を ${Math.abs(remain)} F 超過`;
    rem.className = 'counter-remain';
  }
}

function snTimerToggle() {
  const btn = document.getElementById('sn-timer-btn');
  if (snRunning) {
    snTimerStop();
  } else {
    snRunning = true;
    btn.textContent = '⏸ 停止';
    btn.className = 'ctrl-btn stop';
    snInterval = setInterval(snTimerTick, MS_PER_FRAME);
  }
}
function snTimerStop() {
  clearInterval(snInterval);
  snRunning = false;
  const btn = document.getElementById('sn-timer-btn');
  if (btn) { btn.textContent = '▶ スタート'; btn.className = 'ctrl-btn start'; }
}
function snTimerReset() {
  snTimerStop();
  snFrame = 0;
  document.getElementById('sn-current').textContent      = '0';
  document.getElementById('sn-current-time').textContent = '0d 0h 0m 0s 0f';
  document.getElementById('sn-remain').textContent       = `目標まで ${snTarget.toLocaleString()} F`;
  document.getElementById('sn-remain').className = 'counter-remain';
}

// ─── Metronome ────────────────────────────────────────────
let metroRunning = false;
let metroCtx = null;
let metroNextTime = 0;
let metroSchedulerId = null;
let metroBpm = 30;
let metroBeat = 0;
const SCHEDULE_AHEAD = 0.1;
const SCHEDULE_INTERVAL = 25;

function metroGetCtx() {
  if (!metroCtx) metroCtx = new (window.AudioContext || window.webkitAudioContext)();
  return metroCtx;
}
function metroClick(time, accent) {
  const ctx = metroGetCtx();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain); gain.connect(ctx.destination);
  osc.frequency.value = accent ? 1200 : 800;
  gain.gain.setValueAtTime(accent ? 0.4 : 0.25, time);
  gain.gain.exponentialRampToValueAtTime(0.001, time + 0.03);
  osc.start(time); osc.stop(time + 0.03);
}
function metroSchedule() {
  const ctx = metroGetCtx();
  const interval = 60 / metroBpm;
  while (metroNextTime < ctx.currentTime + SCHEDULE_AHEAD) {
    const beatInBar = metroBeat % 4;
    const accent = beatInBar === 0;
    metroClick(metroNextTime, accent);
    const delay = (metroNextTime - ctx.currentTime) * 1000;
    const capturedBeat = beatInBar;
    setTimeout(() => {
      for (let i = 0; i < 4; i++) {
        const dot = document.getElementById('bd' + i);
        if (!dot) return;
        dot.classList.remove('on', 'on-accent');
      }
      const dot = document.getElementById('bd' + capturedBeat);
      if (dot) dot.classList.add(accent ? 'on-accent' : 'on');
      setTimeout(() => { if (dot) dot.classList.remove('on', 'on-accent'); }, 80);
    }, Math.max(0, delay));
    metroNextTime += interval;
    metroBeat++;
  }
}
function metroToggle() {
  if (metroRunning) { metroStop(); return; }
  const ctx = metroGetCtx();
  if (ctx.state === 'suspended') ctx.resume();
  metroNextTime = ctx.currentTime + 0.05;
  metroBeat = 0;
  metroRunning = true;
  document.getElementById('metro-btn').textContent = '⏸ メトロノーム停止';
  document.getElementById('metro-btn').classList.add('running');
  metroSchedule();
  metroSchedulerId = setInterval(metroSchedule, SCHEDULE_INTERVAL);
}
function metroStop() {
  clearInterval(metroSchedulerId);
  metroRunning = false;
  const btn = document.getElementById('metro-btn');
  if (btn) { btn.textContent = '▶ メトロノーム開始'; btn.classList.remove('running'); }
}
function metroUpdateBpm() {
  metroBpm = parseInt(document.getElementById('metro-bpm').value);
  document.getElementById('metro-bpm-label').textContent = metroBpm + ' fps';
  if (metroRunning) {
    clearInterval(metroSchedulerId);
    const ctx = metroGetCtx();
    metroNextTime = ctx.currentTime + 0.05;
    metroSchedule();
    metroSchedulerId = setInterval(metroSchedule, SCHEDULE_INTERVAL);
  }
}

loadSkills();
